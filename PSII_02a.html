<script>
    let num_of_data = Math.floor(Math.random()*3 + 4);
    let data = [];
    for(let i=0; i<num_of_data; i++){
        let tmp = 0;
        tmp = (Math.random()*21+10) + (Math.random()*21+10) + (Math.random()*21+10);
        tmp = Math.floor(tmp/3);
        data.push(tmp);
    }
    console.log(data);

    let ave = average(data);
    ave = Math.round(ave*100)/100;
    /*
    for(let i=0; i<num_of_data; i++){
        average += data[i];
    }
    average /= num_of_data;
    average = Math.round(average*100)/100;
    */
    console.log(ave);

    let median = 0;
    let data2 = [];
    for(let i=0; i<num_of_data; i++){
        data2.push(data[i]);
    }
    data2.sort();
    console.log(data2);
    if(num_of_data%2 == 1){
        median = data2[(num_of_data-1)/2];
    }else{
        median = (data2[num_of_data/2 -1] + data2[num_of_data/2])/2;
    }
    console.log(median);

    let variance = 0;
    let variance_app = 0
    let data_square = [];
    for(let i=0; i<num_of_data; i++){
        data_square.push(data[i]**2);
    }
    variance = average(data_square) - average(data)**2;
    variance_app = Math.round(variance*100)/100;
    console.log(variance_app);

    let st = Math.sqrt(variance);
    st = Math.round(st*100)/100;
    console.log(st);

    let un_var = num_of_data*variance / (num_of_data - 1);
    un_var = Math.round(un_var*100)/100;
    console.log(un_var);

    function average(array){
        let n = array.length;
        let result = 0;
        for(let i=0; i<n; i++){
            result += array[i];
        }
        result /= n;
        return result;
    }


    let data_in_text = "";
    for(let i=0; i<num_of_data; i++){
        data_in_text += data[i] + ",　";
    }
    data_in_text = data_in_text.slice(0, -2);

    /////////////////////////////////////////
    /*
    a 以上 b 以下の整数をランダムに返す関数 randomInteger
    入力：数値 a,b  (a < b を想定してよい)
    出力：数値
    */            
    function randomInteger(a,b){
        return Math.floor((b-a+1)*Math.random() + a);
    }    

    function average(array){
        let n = array.length;
        let result = 0;
        for(let i=0; i<n; i++){
            result += array[i];
        }
        result /= n;
        return result;
    }

    function expectation(array_var, array_prob){
        let result = 0;
        for(let i=0; i<array_var.length; i++){
            result += array_var[i]*array_prob[i];
        }
        return result;
    }

    function dnorm(x){
        return Math.exp((-1)*(x**2)/2) / Math.sqrt(2*Math.PI);
    }

    function pnorm(x) { // P(Z \leq x) の値を返す。
        // constants
        var p  =  0.2316419;
        var b1 =  0.31938153;
        var b2 = -0.356563782;
        var b3 =  1.781477937;
        var b4 = -1.821255978;
        var b5 =  1.330274429;
        var t = 1 / (1 + p * Math.abs(x));
        var Z = Math.exp(-x * x / 2) / Math.sqrt(2 * Math.PI);
        var y = 1 - Z * ((((b5 * t + b4) * t + b3) * t + b2) * t + b1) * t;
        return (x > 0) ? y : 1 - y;
    }

    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("q1_id").textContent = `\\[ ${data_in_text} \\]`;
        //document.getElementById("q2_id").textContent = `$x = ${x}$`;

        document.getElementById("a1_id").textContent = `$${ave}$`;
        document.getElementById("a2_id").textContent = `$${median}$`;
        document.getElementById("a3_id").textContent = `$${variance_app}$`;
        document.getElementById("a4_id").textContent = `$${st}$`;
        document.getElementById("a5_id").textContent = `$${un_var}$`;
        //document.getElementById("a6_id").textContent = `$${Math.round(correlation_zw*100)/100}$`;
    })

    function show_answer(e){
        let identifier = e.id;
        document.getElementById("a"+identifier).style.color = "red";
    }
</script>

<body class="container">
    <h1>要約統計量</h1>
    <!--
    <div class="box"><span style="color: blue;">【Tips】</span>
        「変量の変換(1)」で導出した、変換後の分散や共分散の式は必要に応じて自力で導出できるように練習しておくこと。
    </div>
    -->
    <p>
        <b>【問題】</b>次はある試験（30点満点）の得点データである。
        <span id="q1_id"></span>
        以下の問に答えよ。数値は必要に応じて小数第2位まで答えよ（小数第3位を四捨五入せよ）。
    </p>
    <p>
        [1] 平均値は　<span id="a1_id" style="color: transparent;"></span>　である。　　<button id="1_id" onclick="show_answer(this)">答え</button><br>
        [2] 中央値は　<span id="a2_id" style="color: transparent;"></span>　である。　　<button id="2_id" onclick="show_answer(this)">答え</button><br>
        [3] 分散は　<span id="a3_id" style="color: transparent;"></span>　である。　　<button id="3_id" onclick="show_answer(this)">答え</button><br>
        [4] 標準偏差は　<span id="a4_id" style="color: transparent;"></span>　である。　　<button id="4_id" onclick="show_answer(this)">答え</button><br>
        [5] 不偏分散は　<span id="a5_id" style="color: transparent;"></span>　である。　　<button id="5_id" onclick="show_answer(this)">答え</button><br>
    </p>
    <!--
    <p>
        <b>【問題】</b> 変量 $x,y$ のデータ $(x_i, y_i) \, (i=1,2, \dots, n)$ が与えられているとする。
        このとき、新しい変量 $z, w$ をそれぞれ
        \[ z_i = x_i + y_i, \quad w_i = x_i - y_i \]
        によって定める。このとき、次の量を $\bar{x}, \bar{y}, s_x^2, s_y^2, s_{xy}$ のうち必要なものを用いて表わせ。
    </p>
    <p>
        [1] 平均値 $\bar{z}$　　<button id="1_id" onclick="show_answer(this)">答え</button>
    </p>
    <p style="color: transparent; margin-left: 27px;" id="a1_id">
        $\bar{z} = \bar{x} + \bar{y}$ である。<br>
        実際、
        \[ \bar{z} = \frac{1}{n} \sum_{i=1}^n z_i = \frac{1}{n} \sum_{i=1}^n (x_i + y_i) = \frac{1}{n} \sum_{i=1}^n x_i + \frac{1}{n} \sum_{i=1}^n y_i = \bar{x} + \bar{y} \]
        と計算できる。

    </p>
    <p>
        [2] 分散 $s_z^2$　　<button id="2_id" onclick="show_answer(this)">答え</button>
    </p>
    <p style="color: transparent; margin-left: 27px;" id="a2_id">
        $s_z^2 = s_x^2 + s_y^2 + 2s_{xy}$ である。<br>
        実際、
        \[ \begin{aligned}
        s_z^2 = \overline{z^2} - \bar{z}^2 &= \overline{(x+y)^2} - (\bar{x} + \bar{y})^2 \\
        &= \overline{x^2+2xy+y^2} - (\bar{x}^2 + 2\bar{x}\bar{y} + \bar{y}^2) \\
        &= \overline{x^2} + 2\overline{xy} + \overline{y^2} - (\bar{x}^2 + 2\bar{x}\bar{y} + \bar{y}^2) \\
        &= \overline{x^2} - \bar{x}^2 + \overline{y^2} - \bar{y}^2 + 2(\overline{xy} - \bar{x}\bar{y}) \\
        &= s_x^2 + s_y^2 + 2s_{xy}
        \end{aligned} \]
        と計算できる。なお、同様にして
        \[ s_w^2 = s_x^2 + s_y^2 - 2s_{xy} \]
        であることも分かる。
    </p>
    <p>
        [3] 共分散 $s_{zw}$  <button id="3_id" onclick="show_answer(this)">答え</button>
    </p>
    <p style="color: transparent; margin-left: 27px;" id="a3_id">
        $s_{zw} = s_x^2 - s_y^2$ である。<br>
        実際、
        \[ \begin{aligned}
        s_{zw} = \overline{zw} - \bar{z}\bar{w} &= \overline{(x+y)(x-y)} - \overline{x+y} \cdot \overline{x-y} \\
        &= \overline{x^2 - y^2} - (\bar{x}+\bar{y})(\bar{x}-\bar{y}) \\
        &= \overline{x^2} - \overline{y^2} - (\bar{x}^2-\bar{y}^2) \\
        &= \overline{x^2} - \overline{y^2} - \bar{x}^2 + \bar{y}^2 \\
        &= \overline{x^2} - \bar{x}^2 - (\overline{y^2} - \bar{y}^2) \\
        &= s_x^2 - s_y^2
        \end{aligned} \]
        と計算できる。
    </p>
